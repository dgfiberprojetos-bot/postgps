<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PosteGPS — Painel Supervisor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
:root{--bg:#080c14;--sf:#0f1623;--sf2:#161e2e;--sf3:#1c2540;--bd:#1e2d45;--bd2:#263554;--ac:#f5a623;--ac2:#e85d04;--gn:#22c55e;--rd:#ef4444;--bl:#3b82f6;--pu:#8b5cf6;--tx:#e8edf5;--tx2:#a8b4c8;--mu:#546880}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;font-size:14px}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.brand h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.brand h1 span{color:var(--ac)}
.brand p{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.hdr-right{display:flex;align-items:center;gap:8px}
.sync-pill{display:flex;align-items:center;gap:6px;background:var(--sf2);border:1px solid var(--bd);border-radius:20px;padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx2)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--mu);flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--gn);box-shadow:0 0 6px var(--gn);animation:pulse 2s infinite}
.sdot.er{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{height:34px;padding:0 14px;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#000}
.btn-primary:hover{box-shadow:0 4px 12px rgba(245,166,35,.4)}
.btn-ghost{background:var(--sf2);border:1px solid var(--bd);color:var(--tx2)}
.btn-ghost:hover{border-color:var(--ac);color:var(--ac)}
.stats-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.stat{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex:1;min-width:100px}
.stat-num{font-size:22px;font-weight:800;color:var(--ac);line-height:1}
.stat-lbl{font-size:10px;color:var(--mu);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.filters{background:var(--sf2);border-bottom:1px solid var(--bd);padding:8px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.flt-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mu);font-family:'JetBrains Mono',monospace;white-space:nowrap}
.flt-sel,.flt-inp{background:var(--sf);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;outline:none;height:32px;transition:border-color .2s}
.flt-sel:focus,.flt-inp:focus{border-color:var(--ac)}
.flt-sel option{background:var(--sf2)}
.flt-sp{flex:1}
.exp-bar{background:var(--sf);border-bottom:1px solid var(--bd);padding:8px 20px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.exp-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ac);font-family:'JetBrains Mono',monospace;margin-right:2px}
.btn-exp{height:30px;padding:0 12px;border-radius:7px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx2);font-family:'Inter',sans-serif;font-weight:600;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-exp:hover{border-color:var(--ac);color:var(--ac)}
.btn-exp.kmz{background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;color:#000}
.btn-exp.kmz:hover{box-shadow:0 4px 12px rgba(245,166,35,.35);color:#000}
.btn-heat{height:30px;padding:0 12px;border-radius:7px;font-family:'Inter',sans-serif;font-weight:600;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;background:var(--sf2);border:1px solid var(--bd);color:var(--tx2)}
.btn-heat.on{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:var(--rd)}
.btn-nophoto{height:30px;padding:0 12px;border-radius:7px;font-family:'Inter',sans-serif;font-weight:600;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;background:var(--sf2);border:1px solid var(--bd);color:var(--tx2);transition:all .15s}
.btn-nophoto:hover{border-color:rgba(239,68,68,.4);color:var(--rd)}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
#map{flex:1;min-height:300px}
.sidebar{width:320px;flex-shrink:0;background:var(--sf);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sb-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--ac);font-family:'JetBrains Mono',monospace}
.sb-count{background:var(--ac);color:#000;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700}
.pole-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.pole-list::-webkit-scrollbar{width:3px}
.pole-list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.pc{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .2s}
.pc:hover{border-color:var(--bd2);transform:translateX(2px)}
.pc.active{border-color:var(--ac);background:rgba(245,166,35,.05)}
.pc-top{display:flex;align-items:flex-start;gap:9px;margin-bottom:7px}
.pc-num{width:30px;height:30px;flex-shrink:0;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#000}
.pc-id{font-size:13px;font-weight:700;margin-bottom:1px}
.pc-type{font-size:11px;color:var(--mu)}
.pc-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mu);line-height:1.8}
.pc-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{display:inline-flex;align-items:center;gap:3px;border-radius:4px;font-size:10px;font-family:'JetBrains Mono',monospace;padding:1px 6px;border:1px solid}
.tag-tech{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--bl)}
.tag-photo{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--gn)}
.tag-visit{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:var(--pu)}
.tag-nophoto{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--rd)}
.empty-list{text-align:center;padding:40px 16px;color:var(--mu)}
.empty-list .ei{font-size:36px;margin-bottom:10px;opacity:.4}
.empty-list p{font-size:13px;line-height:1.6}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--sf);border:1px solid var(--bd);border-radius:30px;padding:10px 20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--gn);color:var(--gn)}
.toast.er{border-color:var(--rd);color:var(--rd)}
.toast.info{border-color:var(--ac);color:var(--ac)}
@media(max-width:768px){.main{flex-direction:column}#map{min-height:50vh;flex:none}.sidebar{width:100%;border-left:none;border-top:1px solid var(--bd);max-height:40vh}.stats-bar{padding:8px 12px}.hdr{padding:0 14px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="logo">🔆</div>
    <div class="brand">
      <h1>PosteGPS <span>Supervisor</span></h1>
      <p>Painel em tempo real</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="sync-pill"><div class="sdot" id="sdot"></div><span id="sinfo">Aguardando...</span></div>
    <button class="btn btn-primary" onclick="loadData()">🔄 Atualizar</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div><div class="stat-num" id="stT">0</div><div class="stat-lbl">Total</div></div></div>
  <div class="stat"><div><div class="stat-num" id="stH">0</div><div class="stat-lbl">Hoje</div></div></div>
  <div class="stat"><div><div class="stat-num" id="stTe">0</div><div class="stat-lbl">Técnicos</div></div></div>
  <div class="stat"><div><div class="stat-num" id="stP">0</div><div class="stat-lbl">Com fotos</div></div></div>
</div>

<div class="filters">
  <span class="flt-lbl">Técnico</span>
  <select class="flt-sel" id="fTech" onchange="applyF()"><option value="">Todos</option></select>
  <span class="flt-lbl">Tipo</span>
  <select class="flt-sel" id="fType" onchange="applyF()">
    <option value="">Todos</option>
    <option>Concreto</option><option>Metálico</option><option>Madeira</option>
    <option>Fibra de Vidro</option><option>Poste com Transformador</option>
  </select>
  <span class="flt-lbl">Buscar</span>
  <input class="flt-inp" id="fSearch" placeholder="ID..." oninput="applyF()" style="width:100px">
  <div class="flt-sp"></div>
  <button class="btn btn-ghost" onclick="clearF()">✕ Limpar</button>
</div>

<div class="exp-bar">
  <span class="exp-lbl">Exportar:</span>
  <button class="btn-exp kmz" onclick="expKMZ()">📦 KMZ</button>
  <button class="btn-exp" onclick="expKML()">📄 KML</button>
  <button class="btn-exp" onclick="expPDF()">📋 PDF</button>
  <button class="btn-exp" onclick="expCSV()">📊 CSV</button>
  <div class="flt-sp"></div>
  <button class="btn-heat" id="btnHeat" onclick="toggleHeat()">🔥 Heatmap</button>
  <button class="btn-nophoto" onclick="filterNoPhoto()">⚠️ Sem foto (<span id="npCount">0</span>)</button>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sb-hdr">
      <span class="sb-title">Lista de Postes</span>
      <span class="sb-count" id="sbCount">0</span>
    </div>
    <div class="pole-list" id="poleList">
      <div class="empty-list"><div class="ei">🗺️</div><p>Carregando dados...</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRaVdTbSME5mD1s2CH0RWbUmNauM8b4_QYINGntHTtG8OUtDRsaxkHu1_550oYxBVFdHwVNtX3C4-v0/pub?output=csv';

// ── STATE ─────────────────────────────────────────────────────────────
let poles=[], filtered=[], map, markers=[], heatLayer=null, heatOn=false, npMode=false;

// ── INIT ──────────────────────────────────────────────────────────────
function init(){
  map = L.map('map').setView([-2.45,-54.71],13);
  
  // Google Hybrid as default
  const hybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{attribution:'© Google',maxZoom:21});
  const sat    = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{attribution:'© Google',maxZoom:21});
  const street = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{attribution:'© Google',maxZoom:21});
  hybrid.addTo(map);
  L.control.layers({'🛰️ Satélite+Ruas':hybrid,'🛰️ Satélite':sat,'🗺️ Ruas':street},{},{position:'topright'}).addTo(map);
  
  loadData();
  setInterval(loadData, 30000);
}

// ── LOAD DATA ─────────────────────────────────────────────────────────
async function loadData(){
  const dot=document.getElementById('sdot');
  const info=document.getElementById('sinfo');
  info.textContent='Carregando...';
  dot.className='sdot';
  try{
    const url = CSV_URL + '&nocache=' + Date.now();
    const resp = await fetch(url, {cache:'no-store'});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    poles = parseCSV(text);
    dot.className='sdot ok';
    info.textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    applyF();
    updateStats();
    toast('📡 '+poles.length+' poste(s) carregado(s)','ok');
  }catch(err){
    console.error('loadData error:',err);
    dot.className='sdot er';
    info.textContent='Erro: '+err.message;
    toast('❌ Erro ao carregar: '+err.message,'er');
  }
}

// ── PARSE CSV ─────────────────────────────────────────────────────────
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const hdrs = splitCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(line=>{
    const cols = splitCSVLine(line);
    const obj = {};
    hdrs.forEach((h,i)=>{ obj[h.trim()] = (cols[i]||'').trim(); });
    obj.lat = parseFloat(obj.lat)||0;
    obj.lng = parseFloat(obj.lng)||0;
    obj.hasPhotos = parseInt(obj.hasPhotos)||0;
    try{ obj.history = obj.history ? JSON.parse(obj.history) : []; }catch(e){ obj.history=[]; }
    return obj;
  }).filter(p=>p.lat&&p.lng&&p.poleId);
}

function splitCSVLine(line){
  const cols=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){ inQ=!inQ; }
    else if(line[i]===','&&!inQ){ cols.push(cur); cur=''; }
    else{ cur+=line[i]; }
  }
  cols.push(cur);
  return cols;
}

// ── STATS ─────────────────────────────────────────────────────────────
function updateStats(){
  document.getElementById('stT').textContent=poles.length;
  const today=new Date().toLocaleDateString('pt-BR');
  document.getElementById('stH').textContent=poles.filter(p=>p.date&&p.date.includes(today)).length;
  document.getElementById('stTe').textContent=new Set(poles.map(p=>p.tech).filter(Boolean)).size;
  document.getElementById('stP').textContent=poles.filter(p=>p.hasPhotos>0).length;
  document.getElementById('npCount').textContent=poles.filter(p=>!p.hasPhotos||p.hasPhotos===0).length;
  // Populate tech filter
  const sel=document.getElementById('fTech');
  const cur=sel.value;
  const techs=[...new Set(poles.map(p=>p.tech).filter(Boolean))];
  sel.innerHTML='<option value="">Todos</option>'+techs.map(t=>`<option value="${t}">${t}</option>`).join('');
  sel.value=cur;
}

// ── FILTERS ───────────────────────────────────────────────────────────
function applyF(){
  npMode=false;
  document.querySelector('.btn-nophoto').style.color='';
  document.querySelector('.btn-nophoto').style.borderColor='';
  const tech=document.getElementById('fTech').value;
  const type=document.getElementById('fType').value;
  const search=document.getElementById('fSearch').value.toLowerCase();
  filtered=poles.filter(p=>{
    if(tech&&p.tech!==tech)return false;
    if(type&&p.type!==type)return false;
    if(search&&!p.poleId.toLowerCase().includes(search))return false;
    return true;
  });
  renderMap();renderList();
  if(heatOn)showHeat();
}

function clearF(){
  document.getElementById('fTech').value='';
  document.getElementById('fType').value='';
  document.getElementById('fSearch').value='';
  applyF();
}

function filterNoPhoto(){
  npMode=!npMode;
  const btn=document.querySelector('.btn-nophoto');
  if(npMode){
    btn.style.color='var(--rd)';btn.style.borderColor='rgba(239,68,68,.4)';
    filtered=poles.filter(p=>!p.hasPhotos||p.hasPhotos===0);
  } else {
    btn.style.color='';btn.style.borderColor='';
    applyF();return;
  }
  renderMap();renderList();
}

// ── MAP ───────────────────────────────────────────────────────────────
function renderMap(){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  if(!filtered.length)return;
  const bounds=[];
  filtered.forEach((p,i)=>{
    if(!p.lat||!p.lng)return;
    const color=p.hasPhotos>0?'#22c55e':'#f5a623';
    const icon=L.divIcon({
      html:`<div style="width:32px;height:32px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:11px;font-weight:800;color:#000">${i+1}</span></div>`,
      className:'',iconSize:[32,32],iconAnchor:[16,32]
    });
    const popup = `<div style="font-family:Inter,sans-serif;font-size:12px;line-height:1.8;min-width:180px">
      <div style="font-size:15px;font-weight:700;margin-bottom:6px">Poste ${p.poleId}</div>
      <div><b>Tipo:</b> ${p.type}${p.model?' — '+p.model:''}</div>
      <div><b>Técnico:</b> ${p.tech||'N/A'}</div>
      <div><b>Data:</b> ${p.date}</div>
      ${p.obs?`<div><b>Obs:</b> ${p.obs}</div>`:''}
      <div><b>Fotos:</b> ${p.hasPhotos||0}</div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <a href="https://www.google.com/maps?q=${p.lat},${p.lng}" target="_blank" style="background:#f5a623;color:#000;padding:4px 10px;border-radius:6px;font-weight:700;font-size:11px;text-decoration:none">🗺 Maps</a>
        <a href="https://waze.com/ul?ll=${p.lat},${p.lng}&navigate=yes" target="_blank" style="background:#33ccff;color:#000;padding:4px 10px;border-radius:6px;font-weight:700;font-size:11px;text-decoration:none">🚗 Waze</a>
      </div>
    </div>`;
    const m=L.marker([p.lat,p.lng],{icon}).addTo(map).bindPopup(popup);
    m.on('click',()=>highlightCard(p.id||p.poleId));
    markers.push(m);
    bounds.push([p.lat,p.lng]);
  });
  if(bounds.length) map.fitBounds(bounds,{padding:[30,30],maxZoom:16});
}

// ── HEATMAP ───────────────────────────────────────────────────────────
function toggleHeat(){
  heatOn=!heatOn;
  const btn=document.getElementById('btnHeat');
  if(heatOn){ btn.className='btn-heat on'; btn.textContent='🔥 Heatmap ON'; showHeat(); }
  else{ btn.className='btn-heat'; btn.textContent='🔥 Heatmap'; if(heatLayer){map.removeLayer(heatLayer);heatLayer=null;} }
}
function showHeat(){
  if(heatLayer) map.removeLayer(heatLayer);
  const pts=filtered.filter(p=>p.lat&&p.lng).map(p=>[p.lat,p.lng,1]);
  if(!pts.length) return;
  heatLayer=L.heatLayer(pts,{radius:35,blur:20,gradient:{0.4:'blue',0.6:'lime',0.8:'yellow',1:'red'}}).addTo(map);
}

// ── LIST ──────────────────────────────────────────────────────────────
function renderList(){
  const list=document.getElementById('poleList');
  document.getElementById('sbCount').textContent=filtered.length;
  if(!filtered.length){
    list.innerHTML='<div class="empty-list"><div class="ei">🔍</div><p>Nenhum poste encontrado</p></div>';
    return;
  }
  list.innerHTML=filtered.map((p,i)=>`
    <div class="pc" id="pc-${p.id||p.poleId}" onclick="focusPole(${i},'${p.id||p.poleId}')">
      <div class="pc-top">
        <div class="pc-num">${i+1}</div>
        <div>
          <div class="pc-id">${p.poleId}</div>
          <div class="pc-type">${p.type}${p.model?' · '+p.model:''}</div>
        </div>
      </div>
      <div class="pc-meta">📍 ${parseFloat(p.lat).toFixed(4)}, ${parseFloat(p.lng).toFixed(4)}<br>🕐 ${p.date}</div>
      <div class="pc-tags">
        ${p.tech?`<span class="tag tag-tech">👷 ${p.tech}</span>`:''}
        ${p.hasPhotos>0?`<span class="tag tag-photo">📷 ${p.hasPhotos}</span>`:'<span class="tag tag-nophoto">⚠️ Sem foto</span>'}
        ${(p.history||[]).length>0?`<span class="tag tag-visit">🔄 ${p.history.length}</span>`:''}
      </div>
    </div>`).join('');
}

function focusPole(i,id){
  if(markers[i]){map.setView(markers[i].getLatLng(),18);markers[i].openPopup();}
  document.querySelectorAll('.pc').forEach(c=>c.classList.remove('active'));
  const el=document.getElementById('pc-'+id);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function highlightCard(id){
  document.querySelectorAll('.pc').forEach(c=>c.classList.remove('active'));
  const el=document.getElementById('pc-'+id);
  if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
}

// ── EXPORTS ───────────────────────────────────────────────────────────
function dlBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);}

function buildKML(){
  const ps=filtered.map(p=>`<Placemark><n>${p.poleId}</n><styleUrl>#p</styleUrl><description><![CDATA[<b>Tipo:</b>${p.type}<br/><b>Técnico:</b>${p.tech||'N/A'}<br/><b>Data:</b>${p.date}]]></description><Point><coordinates>${p.lng},${p.lat},0</coordinates></Point></Placemark>`).join('');
  return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><n>PosteGPS Supervisor</n><Style id="p"><IconStyle><color>ff23a0f5</color><scale>1.2</scale><Icon><href>http://maps.google.com/mapfiles/kml/shapes/placemark_circle.png</href></Icon></IconStyle></Style>${ps}</Document></kml>`;
}

function expKML(){
  if(!filtered.length){toast('Nenhum poste','info');return;}
  dlBlob(new Blob([buildKML()],{type:'application/vnd.google-earth.kml+xml'}),'postes.kml');
  toast('📄 KML exportado!','ok');
}

async function expKMZ(){
  if(!filtered.length){toast('Nenhum poste','info');return;}
  if(typeof JSZip==='undefined'){toast('Aguarde...','info');setTimeout(expKMZ,1000);return;}
  toast('📦 Gerando...','info');
  const zip=new JSZip();zip.file('doc.kml',buildKML());
  const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE'});
  dlBlob(blob,'postes.kmz');toast('✅ KMZ exportado!','ok');
}

function expCSV(){
  if(!filtered.length){toast('Nenhum poste','info');return;}
  const sep=';';
  const hds=['ID','Tipo','Modelo','Lat','Lng','Técnico','Data','Obs','Fotos','Visitas'];
  const rows=filtered.map(p=>[p.poleId,p.type,p.model||'',p.lat,p.lng,p.tech||'',p.date,(p.obs||'').replace(/;/g,','),p.hasPhotos||0,(p.history||[]).length].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(sep));
  const csv='\uFEFF'+[hds.join(sep),...rows].join('\n');
  dlBlob(new Blob([csv],{type:'text/csv;charset=utf-8'}),'postes.csv');
  toast('📊 CSV exportado!','ok');
}

async function expPDF(){
  if(!filtered.length){toast('Nenhum poste','info');return;}
  if(typeof window.jspdf==='undefined'){toast('Aguarde...','info');setTimeout(expPDF,1000);return;}
  toast('📋 Gerando PDF...','info');
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const M=14,W=210,CW=W-M*2;let y=20;
    doc.setFillColor(10,14,23);doc.rect(0,0,210,30,'F');
    doc.setTextColor(245,166,35);doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text('PosteGPS — Painel Supervisor',M,16);
    doc.setFontSize(9);doc.setTextColor(150,150,150);
    doc.text(new Date().toLocaleString('pt-BR')+' • '+filtered.length+' poste(s)',M,24);
    y=38;
    for(let i=0;i<filtered.length;i++){
      const p=filtered[i];
      if(y>255){doc.addPage();y=18;}
      doc.setFillColor(245,166,35);doc.rect(M,y,CW,7,'F');
      doc.setTextColor(0);doc.setFontSize(10);doc.setFont('helvetica','bold');
      doc.text(`${i+1}. ${p.poleId} — ${p.type}${p.model?' — '+p.model:''}`,M+2,y+5);y+=10;
      doc.setTextColor(40);doc.setFontSize(8);doc.setFont('helvetica','normal');
      [`Técnico: ${p.tech||'N/A'}`,`GPS: ${p.lat}, ${p.lng}`,`Data: ${p.date}`,p.obs?`Obs: ${p.obs}`:null,`Fotos: ${p.hasPhotos||0}`].filter(Boolean).forEach(l=>{doc.text(l,M,y);y+=4.5;});
      doc.setDrawColor(220);doc.line(M,y+2,M+CW,y+2);y+=7;
    }
    doc.save('supervisor-'+new Date().toISOString().slice(0,10)+'.pdf');
    toast('✅ PDF gerado!','ok');
  }catch(e){toast('❌ Erro PDF','er');}
}

// ── TOAST ─────────────────────────────────────────────────────────────
let tt;
function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),3000);
}

init();
</script>
